# Demo floorplan used by CI, Lighthouse, and tests.
# GPS points to a well-known public landmark (The White House) — not a private residence.
gps:
  latitude: 38.8977 # decimal degrees (N is positive)
  longitude: -77.0366 # decimal degrees (E is positive)
  elevation: 18.0 # in meters

default_floor_id: ground

floors:
  - id: ground
    name: Ground Floor
    initial_scale: 1.97
    initial_x: -0.16
    initial_y: -6.3
    bounds: [[-2, -2, 0], [18, 16, 2.4384]]
    rooms:
      - name: Entry
        id: entry
        points:
          - [0, 0]
          - [3.5, 0]
          - [3.5, 4.0]
          - [0, 4.0]
      - name: Living Room
        id: living_room
        points:
          - [3.5, 0]
          - [9.0, 0]
          - [9.0, 5.5]
          - [3.5, 5.5]
      - name: Kitchen
        id: kitchen
        points:
          - [0, 4.0]
          - [3.5, 4.0]
          - [3.5, 8.0]
          - [0, 8.0]
      - name: Dining Area
        id: dining_area
        points:
          - [3.5, 5.5]
          - [9.0, 5.5]
          - [9.0, 8.5]
          - [3.5, 8.5]
      - name: Bedroom 1
        id: bedroom_1
        points:
          - [9.0, 0]
          - [13.5, 0]
          - [13.5, 4.5]
          - [9.0, 4.5]
      - name: Bedroom 2
        id: bedroom_2
        points:
          - [9.0, 4.5]
          - [13.5, 4.5]
          - [13.5, 8.5]
          - [9.0, 8.5]
      - name: Bathroom
        id: bathroom
        points:
          - [0, 8.0]
          - [4.5, 8.0]
          - [4.5, 11.0]
          - [0, 11.0]
      - name: Office
        id: office
        points:
          - [4.5, 8.5]
          - [9.0, 8.5]
          - [9.0, 12.0]
          - [4.5, 12.0]
      - name: Hallway
        id: hallway
        points:
          - [4.5, 8.0]
          - [9.0, 8.0]
          - [9.0, 8.5]
          - [13.5, 8.5]
          - [13.5, 9.5]
          - [4.5, 9.5]
          - [4.5, 11.0]
          - [0, 11.0]
          - [0, 8.0]
      - name: Garage
        id: garage
        points:
          - [-2.0, 8.0]
          - [0, 8.0]
          - [0, 15.0]
          - [-2.0, 15.0]
  - id: attic
    name: Attic
    initial_scale: 1.97
    initial_x: -0.16
    initial_y: -6.3
    bounds: [[0, 0, 2.4384], [14, 10, 6]]
    rooms:
      - id: attic
        name: Attic
        points:
          - [0, 0]
          - [14, 0]
          - [14, 10]
          - [0, 10]

# Locations of espresense nodes in meters
nodes:
  - name: Living Room Node
    id: living_room
    floor: ground
    room: Living Room
    point: [6.0, 2.5, 1]
  - name: Kitchen Node
    id: kitchen
    floor: ground
    room: Kitchen
    point: [1.5, 6.0, 1]
  - name: Bedroom Node
    id: bedroom_1
    floor: ground
    room: Bedroom 1
    point: [11.0, 2.0, 1]
  - name: Office Node
    id: office
    floor: ground
    room: Office
    point: [6.5, 10.0, 1]

locators:
  nadaraya_watson:
    enabled: true
    floors: ['ground']
    bandwidth: 0.5
    kernel: gaussian

  nealder_mead:
    enabled: false
    floors: ['ground']
    weighting:
      algorithm: gaussian
      props:
        sigma: 0.10

  nearest_node:
    enabled: false
    max_distance: 10 # in meters
