map $http_origin $cors_allow_origin {
  default "";
  "~^https?://localhost(:[0-9]+)?$" $http_origin;
  "~^https?://127\\.0\\.0\\.1(:[0-9]+)?$" $http_origin;
  "~^https?://10\\.[0-9][0-9]?[0-9]?\\.[0-9][0-9]?[0-9]?\\.[0-9][0-9]?[0-9]?(:[0-9]+)?$" $http_origin;
  "~^https?://192\\.168\\.[0-9][0-9]?[0-9]?\\.[0-9][0-9]?[0-9]?(:[0-9]+)?$" $http_origin;
  "~^https?://172\\.(1[6-9]|2[0-9]|3[0-1])\\.[0-9][0-9]?[0-9]?\\.[0-9][0-9]?[0-9]?(:[0-9]+)?$" $http_origin;
}

map "$request_method:$cors_allow_origin" $cors_preflight_status {
  default 0;
  "~^OPTIONS:$" 403;
  "~^OPTIONS:.+" 204;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header Access-Control-Allow-Origin $cors_allow_origin always;
  add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
  add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, User-Agent, DNT, Cache-Control, X-Requested-With" always;
  add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
  add_header Vary "Origin" always;

  if ($cors_preflight_status = 403) {
    return 403;
  }

  if ($cors_preflight_status = 204) {
    return 204;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:css|js|mjs|svg|ico|png|jpg|jpeg|gif|webp|woff|woff2)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
  }
}